<script>
    const GLOBAL_BIN_URL = "https://kvstorage.com/api/v1/vectors/devhive_global_feed";

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        let currentCreator = localStorage.getItem('devHiveUser') || "@guest_creator";

        const newProject = {
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            description: document.getElementById('description').value,
            thumbnail: document.getElementById('thumbnail').value || "https://picsum.photos/400/300",
            project_link: document.getElementById('projectLink').value,
            username: currentCreator
        };

        // 1. Download the current global array list
        let currentFeed = [];
        try {
            const res = await fetch(GLOBAL_BIN_URL);
            const data = await res.json();
            currentFeed = data.value || [];
        } catch(err) {}

        // 2. Append new project file structure to the front of the list
        currentFeed.unshift(newProject);

        // 3. Upload the updated master array sheet back up to the public hub
        try {
            await fetch(GLOBAL_BIN_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ value: currentFeed })
            });
            alert("Success! Your submission is now globally live on the Dev-Hive feed network.");
            window.location.href = 'index.html';
        } catch (error) {
            alert("Error updating shared storage cloud.");
        }
    });
</script>
